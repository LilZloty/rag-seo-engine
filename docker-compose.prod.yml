# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=WARNING
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always

  celery-worker:
    command: celery -A app.celery_app:celery worker --loglevel=warning --concurrency=4
    environment:
      - ENVIRONMENT=production
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  celery-flower:
    environment:
      - ENVIRONMENT=production
    restart: always

  frontend:
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  postgres:
    restart: always

  redis:
    restart: always
